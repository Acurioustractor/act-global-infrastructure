name: Daily Health Check

on:
  schedule:
    # Run daily at 7 AM AEST (9 PM UTC previous day)
    - cron: '0 21 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  health-check:
    name: Monitor Deployment Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all sites
        run: |
          echo "Checking all production sites..."

          declare -a sites=(
            "https://act.place"
            "https://empathy-ledger.vercel.app"
            "https://justicehub.vercel.app"
            "https://theharvest.vercel.app"
            "https://goodsoncountry.com.au"
            "https://actfarm.org.au"
            "https://command-center-rho.vercel.app"
          )

          failed_sites=()

          for site in "${sites[@]}"
          do
            echo "Checking $site..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$site" || echo "000")

            if [ "$response" = "200" ] || [ "$response" = "301" ] || [ "$response" = "302" ] || [ "$response" = "308" ]; then
              echo "  OK $site - HTTP $response"
            else
              echo "  FAIL $site - HTTP $response"
              failed_sites+=("$site ($response)")
            fi
          done

          if [ ${#failed_sites[@]} -gt 0 ]; then
            echo ""
            echo "Failed sites: ${failed_sites[*]}"
            # Export for issue creation step
            echo "FAILED_SITES<<EOF" >> $GITHUB_ENV
            printf '%s\n' "${failed_sites[@]}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            exit 1
          else
            echo ""
            echo "All sites healthy!"
          fi

      - name: Create issue if health check fails
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check for existing open health check issue to avoid spam
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated,health-check',
              per_page: 1
            });

            if (existingIssues.length > 0) {
              // Add comment to existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `Still failing as of ${new Date().toISOString()}\n\nFailed sites:\n${process.env.FAILED_SITES || 'See workflow logs'}\n\n[Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Daily Health Check Failed',
              body: `## Health Check Failure\n\nFailed sites:\n${process.env.FAILED_SITES || 'See workflow logs'}\n\n**Timestamp**: ${new Date().toISOString()}\n\n[Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['Type: Bug', 'Priority: High', 'automated', 'health-check']
            });

      - name: Auto-close issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated,health-check',
              per_page: 5
            });

            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `All sites healthy as of ${new Date().toISOString()}. Auto-closing.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
