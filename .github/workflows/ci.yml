name: CI

on:
  push:
    branches: [main]
  # Runs on EVERY PR (no path filter) so "Type Check & Lint" can be a REQUIRED status check —
  # a path-filtered check skips unrelated PRs, leaving the required context stuck "pending" and
  # blocking the merge forever. Type check + lint are cheap.
  pull_request:

jobs:
  typecheck-and-lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @act/command-center exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @act/command-center lint
