name: Wiki Rebuild

on:
  push:
    branches: [main]
    paths:
      - 'wiki/concepts/**'
      - 'wiki/projects/**'
      - 'wiki/communities/**'
      - 'wiki/people/**'
      - 'wiki/stories/**'
      - 'wiki/art/**'
      - 'wiki/finance/**'
      - 'wiki/technical/**'
      - 'wiki/decisions/**'
      - 'wiki/research/**'
      - 'wiki/synthesis/**'
      - 'wiki/index.md'
      - 'wiki/AGENTS.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    name: Rebuild Tractorpedia Viewer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: Lint wiki
        run: node scripts/wiki-lint.mjs || true

      - name: Update search index
        if: ${{ env.HAS_OPENAI == 'true' }}
        run: node scripts/wiki-index-search.mjs --full || true
        env:
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

      - name: Rebuild viewer + snapshot
        run: node scripts/wiki-build-viewer.mjs

      - name: Copy viewer to public
        run: cp tools/act-wikipedia.html apps/command-center/public/tractorpedia.html

      - name: Commit rebuilt artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/act-wikipedia.html apps/command-center/public/tractorpedia.html apps/command-center/public/wiki/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-rebuild Tractorpedia viewer [skip ci]"
            git push
          fi

      - name: Dispatch to act-regenerative-studio
        if: ${{ env.HAS_TOKEN == 'true' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: Acurioustractor/act-regenerative-studio
          event-type: wiki-content-updated
        env:
          HAS_TOKEN: ${{ secrets.CROSS_REPO_TOKEN != '' }}
